<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result UI</title>

<style>

/* RESULT SECTION */
.results {
    display: block; /* change to none when integrating */
    padding: 80px 10%;
}

.result-title {
    text-align: center;
    margin-bottom: 40px;
    font-size: 34px;
    font-weight: bold;
}

/* GRID */
.result-container {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
}

/* PANELS */
.left-panel, .right-panel {
    flex: 1;
    background: rgba(255,255,255,0.06);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 25px rgba(0,255,255,0.1);
    transition: 0.3s;
}

.left-panel:hover, .right-panel:hover {
    transform: translateY(-5px);
}

/* SCORE */
.score-card {
    text-align: center;
}

.progress-ring {
    width: 170px;
    height: 170px;
    margin: 20px auto;
    border-radius: 50%;
    background: conic-gradient(#00f2fe 75%, #333 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.progress-ring::before {
    content: "";
    position: absolute;
    width: 130px;
    height: 130px;
    background: #1e293b;
    border-radius: 50%;
}

.score-text {
    position: relative;
    font-size: 30px;
    font-weight: bold;
}

.score-msg {
    opacity: 0.8;
    margin-top: 10px;
}

/* SKILLS */
.skills h3 {
    margin-top: 25px;
}

.tags {
    margin-top: 15px;
}

.tags span {
    display: inline-block;
    background: rgba(0,255,255,0.2);
    padding: 8px 14px;
    margin: 6px;
    border-radius: 20px;
    font-size: 13px;
    transition: 0.3s;
}

.tags span:hover {
    background: rgba(0,255,255,0.4);
    transform: scale(1.1);
}

/* SUGGESTIONS */
.right-panel h3 {
    margin-bottom: 20px;
}

.suggestion-card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    margin: 15px 0;
    border-radius: 12px;
    transition: 0.3s;
    border-left: 4px solid #00f2fe;
}

.suggestion-card:hover {
    transform: translateX(10px);
    background: rgba(0,255,255,0.15);
}

/* RESPONSIVE */
@media(max-width: 768px){
    .result-container {
        flex-direction: column;
    }
}

</style>
</head>

<body style="background:#0f2027;color:white;">

<section class="results" id="results">

<h2 class="result-title">🚀 Your Resume Analysis</h2>

<div class="result-container">

    <!-- LEFT -->
    <div class="left-panel">

        <div class="score-card">
            <h3>ATS Score</h3>

            <div class="progress-ring">
                <span class="score-text">75%</span>
            </div>

            <p class="score-msg">Good, but can be improved</p>
        </div>

        <div class="skills">
            <h3>Top Skills Found</h3>
            <div class="tags">
                <span>Python</span>
                <span>Flask</span>
                <span>SQL</span>
                <span>Machine Learning</span>
            </div>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <h3>🤖 AI Suggestions</h3>

        <div class="suggestion-card">📌 Add more quantified achievements</div>
        <div class="suggestion-card">📌 Include keywords like Python, Flask</div>
        <div class="suggestion-card">📌 Improve your summary section</div>

    </div>

</div>

</section>

</body>
</html>
